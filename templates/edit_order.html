{% extends "base.html" %}

{% block title %}Edit Order - Order Tracking System{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Edit Order - {{ order.order_id }}</h1>
    <a href="{{ url_for('orders.view_order_details', order_id=order.order_id) }}" class="btn btn-secondary">← Back to Order</a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('orders.edit_order', order_id=order.order_id) }}" class="form">
        
        <div class="form-section">
            <h3>Order Information</h3>

            <div class="form-row">
                <div class="form-group">
                    <label>Order ID:</label>
                    <input type="text" value="{{ order.order_id }}" class="form-control" disabled>
                    <small>Order ID cannot be changed</small>
                </div>

                <div class="form-group">
                    <label for="order_date">Order Date:</label>
                    <input type="date" value="{{ order.order_date }}" class="form-control" disabled>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>Customer Information</h3>

            <div class="form-row">
                <div class="form-group">
                    <label for="customer_name">Customer Name: <span class="required">*</span></label>
                    <input type="text" id="customer_name" name="customer_name" value="{{ order.customer_name }}" required class="form-control" maxlength="100">
                </div>

                <div class="form-group">
                    <label for="contact_number">Contact Number: <span class="required">*</span></label>
                    <input type="text" id="contact_number" name="contact_number" value="{{ order.contact_number }}" required class="form-control" maxlength="20">
                </div>
            </div>

            <div class="form-group">
                <label for="shipping_address">Shipping Address: <span class="required">*</span></label>
                <textarea id="shipping_address" name="shipping_address" required class="form-control" maxlength="250" rows="4">{{ order.shipping_address }}</textarea>
            </div>
        </div>

        <div class="form-section">
            <h3>Product Information</h3>

            <div class="form-row">
                <div class="form-group">
                    <label for="product_name">Product Name: <span class="required">*</span></label>
                    <input type="text" id="product_name" name="product_name" value="{{ order.product_name }}" required class="form-control" maxlength="100">
                </div>

                <div class="form-group">
                    <label for="quantity">Quantity: <span class="required">*</span></label>
                    <input type="number" id="quantity" name="quantity" value="{{ order.quantity }}" required class="form-control" min="1">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="price">Price: <span class="required">*</span></label>
                    <input type="number" id="price" name="price" value="{{ "%.2f"|format(order.price) }}" required class="form-control" step="0.01" min="0">
                </div>

                <div class="form-group">
                    <label for="tracking_number">Tracking Number:</label>
                    <input type="text" id="tracking_number" name="tracking_number" value="{{ order.tracking_number or '' }}" class="form-control" maxlength="50">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>Delivery & Status</h3>

            <div class="form-row">
                <div class="form-group">
                    <label for="delivery_date">Delivery Date:</label>
                    <input type="date" id="delivery_date" name="delivery_date" value="{{ order.delivery_date or '' }}" class="form-control">
                </div>

                <div class="form-group">
                    <label for="status">Status: <span class="required">*</span></label>
                    <select id="status" name="status" required class="form-control">
                        {% for status in statuses %}
                        <option value="{{ status }}" {% if status == order.status %}selected{% endif %}>{{ status }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="payment_status">Payment Status: <span class="required">*</span></label>
                    <select id="payment_status" name="payment_status" required class="form-control">
                        {% for payment_status in payment_statuses %}
                        <option value="{{ payment_status }}" {% if payment_status == order.payment_status %}selected{% endif %}>{{ payment_status }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update Order</button>
            <a href="{{ url_for('orders.view_order_details', order_id=order.order_id) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
